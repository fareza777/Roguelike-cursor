name: Validate Content

on:
  push:
    paths:
      - 'data/**'
      - 'tools/**'
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python tools/validate_data.py
